<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Buddy</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        width: 300px;
        margin: 0;
        background: #f5f7fb;
      }

      .header {
        background: #4a90e2;
        color: white;
        padding: 12px;
        display: flex;
        align-items: center;
      }

      .logo {
        width: 30px;
        margin-right: 10px;
      }

      .card {
        background: white;
        margin: 10px;
        padding: 10px;
        border-radius: 10px;
      }

      #score-fill {
        height: 20px;
        width: 0%;
        color: white;
        text-align: center;
      }

      button {
        width: 90%;
        margin: 10px;
        padding: 8px;
        border: none;
        border-radius: 8px;
        background: #4a90e2;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <img src="logo.png" class="logo" />
      <b>Buddy</b>
    </div>

    <div class="card">
      <div id="url"></div>
      <div id="score-fill"></div>
      <div id="status"></div>
    </div>

    <div class="card">
      <b>Tips</b>
      <ul id="tips"></ul>
    </div>

    <button id="openDashboard">Open Full Dashboard</button>

    <script src="popup.js"></script>
  </body>
</html>
