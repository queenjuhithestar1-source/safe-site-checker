<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Buddy</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        width: 300px;
        margin: 0;
        background: #f5f7fb;
      }

      .header {
        background: #4a90e2;
        color: white;
        padding: 12px;
        display: flex;
        align-items: center;
        border-bottom-left-radius: 15px;
        border-bottom-right-radius: 15px;
      }

      .logo {
        width: 30px;
        height: 30px;
        margin-right: 10px;
        border-radius: 50%;
        object-fit: cover;
      }

      .title {
        font-size: 18px;
        font-weight: bold;
      }

      .card {
        background: white;
        margin: 10px;
        padding: 10px;
        border-radius: 12px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }

      #url {
        font-size: 11px;
        color: #777;
        word-wrap: break-word;
      }

      #score-bar {
        width: 100%;
        height: 18px;
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 8px;
      }

      #score-fill {
        height: 100%;
        width: 0%;
        text-align: center;
        color: white;
        font-size: 12px;
        line-height: 18px;
      }

      #status {
        margin-top: 5px;
        font-weight: bold;
      }

      ul {
        padding-left: 18px;
        font-size: 13px;
      }

      #history {
        max-height: 80px;
        overflow-y: auto;
        font-size: 12px;
      }

      button {
        width: 90%;
        margin: 10px;
        padding: 8px;
        border: none;
        border-radius: 8px;
        background: #4a90e2;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <img src="logo.png" class="logo" />
      <div class="title">Buddy</div>
    </div>

    <div class="card">
      <div id="url">Checking...</div>

      <div id="score-bar">
        <div id="score-fill">0</div>
      </div>

      <div id="status"></div>
    </div>

    <div class="card">
      <b>Tips</b>
      <ul id="tips"></ul>
    </div>

    <div class="card">
      <b>Recent Checks</b>
      <div id="history"></div>
    </div>

    <!-- ✅ FIXED BUTTON (NO onclick) -->
    <button id="openDashboard">Open Full Dashboard</button>

    <script src="popup.js"></script>
  </body>
</html>
