<!DOCTYPE html>
<html>
  <head>
    <title>SafeSite Checker</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 300px;
        padding: 15px;
        background-color: #f4f6f8;
      }

      h2 {
        margin-top: 0;
        text-align: center;
      }

      #url {
        font-size: 12px;
        word-wrap: break-word;
        color: #555;
      }

      #score-bar {
        width: 100%;
        height: 20px;
        background-color: #ddd;
        border-radius: 10px;
        margin: 10px 0;
        overflow: hidden;
      }

      #score-fill {
        height: 100%;
        width: 0;
        background-color: green;
        text-align: center;
        color: white;
        line-height: 20px;
        font-weight: bold;
      }

      #status {
        font-size: 16px;
        font-weight: bold;
        margin: 5px 0;
      }

      ul {
        padding-left: 18px;
        font-size: 13px;
      }

      #history {
        margin-top: 15px;
        font-size: 12px;
        max-height: 80px;
        overflow-y: auto;
        background: #fff;
        padding: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }
    </style>
  </head>

  <body>
    <h2>🔐 SafeSite Checker</h2>

    <div id="url">Checking...</div>

    <div id="score-bar">
      <div id="score-fill">0/100</div>
    </div>

    <div id="status">Status</div>

    <ul id="tips"></ul>

    <h4>Recent Checks:</h4>
    <div id="history"></div>

    <script src="popup.js"></script>
  </body>
</html>
